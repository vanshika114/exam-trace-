version: "3.9"

services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  analyzer:
    build: ./analyzer
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1

  server:
    build: ./server
    ports:
      - "3001:3001"
    depends_on:
      - mongo
      - analyzer
    env_file:
      - ./server/.env
    environment:
      - MONGO_URI=mongodb://mongo:27017/examguard
      - ANALYZER_URL=http://analyzer:8000

  client:
    build: ./client
    ports:
      - "5173:5173"
    depends_on:
      - server
    environment:
      - VITE_API_URL=http://localhost:3001

volumes:
  mongo_data: